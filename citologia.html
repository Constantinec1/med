<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora Citologia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: auto;
      padding: 20px;
      background: #f4f4f9;
    }
    h2 {
      text-align: center;
      font-size: 1.8em;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 1em;
    }
    button {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      background: #007BFF;
      color: white;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background: #0056b3;
    }
    .resultado {
      margin-top: 30px;
      background: white;
      border-left: 5px solid #007BFF;
      padding: 15px;
      white-space: pre-wrap;
      font-size: 1em;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: #333;
      font-size: 1em;
    }
    @media (max-width: 768px) {
      body {
        padding: 15px;
      }
      h2 {
        font-size: 1.5em;
      }
      input {
        font-size: 1.1em;
      }
      button {
        font-size: 1.2em;
        padding: 15px;
      }
      .resultado {
        font-size: 1.1em;
      }
      a {
        font-size: 1.1em;
      }
    }
  </style>
</head>
<body>
  <a href="semestre1.html">&larr; Voltar ao menu</a>
  <h2>🔬 Calculadora – CITOLOGIA</h2>
  <p>Preencha as notas que já tem. A média final é a ponderação das três avaliações (100% da nota).</p>

  <label>Nota A1 (peso 0,7)</label>
  <input type="number" step="0.01" id="a1" placeholder="Ex: 7.5">

  <label>Nota A2 (peso 1,1)</label>
  <input type="number" step="0.01" id="a2" placeholder="Ex: 8.0">

  <label>Nota A3 (peso 1,2)</label>
  <input type="number" step="0.01" id="a3" placeholder="Ex: 6.5">

  <button onclick="calcularCitologia()">Calcular Nota</button>

  <div id="resultado" class="resultado" style="display:none;"></div>

  <script>
    function calcularCitologia() {
      const pesos = { a1: 0.7, a2: 1.1, a3: 1.2 };
      let somaPesosPreenchidos = 0;
      let somaNotas = 0;
      let totalPesos = 3.0;

      for (const key in pesos) {
        const val = parseFloat(document.getElementById(key).value);
        if (!isNaN(val)) {
          somaPesosPreenchidos += pesos[key];
          somaNotas += val * pesos[key];
        }
      }

      if (somaPesosPreenchidos === 0) {
        alert("Por favor, preencha pelo menos uma nota.");
        return;
      }

      const nfParcial = somaNotas / totalPesos;
      const restantePeso = totalPesos - somaPesosPreenchidos;

      let texto = `Nota parcial calculada: ${nfParcial.toFixed(2)}\n\n`;
      const metas = [
        { nome: "MM (5,0)", alvo: 5.0 },
        { nome: "MS (7,0)", alvo: 7.0 },
        { nome: "SS (9,0)", alvo: 9.0 }
      ];

      if (restantePeso > 0) {
        metas.forEach(meta => {
          const falta = (meta.alvo * totalPesos - somaNotas) / restantePeso;
          if (falta <= 0) {
            texto += `✅ Já garantiu ${meta.nome}\n`;
          } else if (falta > 10) {
            texto += `❌ Mesmo tirando 10 nas restantes, não atinge ${meta.nome}\n`;
          } else {
            texto += `🔹 Precisa média ${falta.toFixed(2)} nas avaliações restantes para ${meta.nome}\n`;
          }
        });
      } else {
        texto = `Nota final (NF): ${nfParcial.toFixed(2)}\n\n`;
        metas.forEach(meta => {
          if (nfParcial >= meta.alvo) {
            texto += `✅ Já atingiu ${meta.nome}\n`;
          } else {
            texto += `❌ Não atingiu ${meta.nome}\n`;
          }
        });
      }

      const div = document.getElementById("resultado");
      div.style.display = "block";
      div.textContent = texto;

      div.scrollIntoView({ behavior: "smooth" });
    }
  </script>
</body>
</html>
