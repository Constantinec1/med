<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadoras Turma 121</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      text-align: center;
      padding: 50px 20px;
    }
    h1 {
      margin-bottom: 30px;
      font-size: 2em;
    }
    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      background: white;
      padding: 25px;
      width: 200px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #333;
      transition: transform .2s, box-shadow .2s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .card span {
      font-size: 50px;
      margin-bottom: 10px;
    }
    /* Mobile */
    @media (max-width: 768px) {
      body {
        padding: 30px 10px;
      }
      h1 {
        font-size: 1.6em;
      }
      .card {
        width: 100%;
        max-width: 300px;
        padding: 20px;
      }
      .card span {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <h1>Calculadoras Turma 121🦎</h1>
  <p>Escolha o semestre:</p>

  <div class="menu">
    <a href="semestre1.html" class="card">
      <span>🥼</span>
      <strong>1º Semestre</strong>
    </a>

    <a href="semestre2.html" class="card">
      <span>🩺</span>
      <strong>2º Semestre</strong>
    </a>
    
    <a href="semestre3.html" class="card">
      <span>🧫</span>
      <strong>3º Semestre</strong>
    </a>
    
  </div>
</body>
</html>
