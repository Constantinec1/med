<head>

  <style>
    :root{

      --accent:#22c55e; --accent2:#38bdf8; --wrong:#ef4444; --border:#334155; --tab:#020617;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top,#1e3a5f,var(--bg));color:var(--text);line-height:1.5}

    .topbar{position:sticky;top:0;z-index:5;background:rgba(8,17,31,.94);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:16px;padding:12px;display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:14px}
    .progress{flex:1;min-width:220px;height:12px;background:#020617;border-radius:999px;overflow:hidden;border:1px solid var(--border)}
    .bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.3s}.score{font-weight:700}
    .tabs{
  display:flex;
  justify-content:center;
  padding:10px 0 14px;
}
    .tab-btn{white-space:nowrap;border:1px solid var(--border);background:var(--tab);color:var(--text);border-radius:999px;padding:10px 14px;font-weight:750;cursor:pointer}
    .tab-btn.active{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#03111f;border-color:transparent}
    .tab-content{display:none}.tab-content.active{display:block}
    .card{background:linear-gradient(180deg,rgba(31,41,55,.96),rgba(17,24,39,.96));border:1px solid var(--border);border-radius:20px;padding:20px;margin:12px 0 18px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
    .phase{display:inline-block;padding:5px 10px;border-radius:999px;background:#020617;border:1px solid var(--border);color:#bfdbfe;font-size:.9rem;margin-bottom:8px}
    h2{margin:6px 0 10px;font-size:1.35rem}
    .intro{color:var(--muted);background:rgba(2,6,23,.35);border:1px solid var(--border);border-radius:14px;padding:12px;margin:10px 0 16px}
    .question{padding:14px;border:1px solid var(--border);border-radius:14px;background:rgba(2,6,23,.35);margin:12px 0}
    .qtext{font-weight:700;margin-bottom:10px}
    button,.choice{cursor:pointer;border:none;border-radius:12px;padding:10px 14px;font-weight:700;color:var(--text);background:#334155;margin:4px;transition:.15s}
    button:hover,.choice:hover{transform:translateY(-1px);filter:brightness(1.1)}
    .choice.correct{background:var(--accent);color:#03111f}.choice.wrong{background:var(--wrong)}
    input[type="text"]{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:#020617;color:var(--text);font-size:1rem;margin-top:8px}
    .mini{color:var(--muted);font-size:.92rem}.feedback{margin-top:8px;font-weight:650}.ok{color:#86efac}.bad{color:#fca5a5}

    .section-title{margin-top:20px;color:#bfdbfe;font-size:1.05rem;font-weight:800;border-left:4px solid var(--accent2);padding-left:10px}

</head>

  <h1>Prática de Parasitologia</h1>

</header>

    <div class="score">Pontuação: <span id="score">0</span>/<span id="total">0</span></div>
  </div>

  <nav class="tabs">
    <button class="tab-btn active" onclick="openTab('pratica', this)">🔬 Prática</button>
  </nav>

  <section id="pratica" class="tab-content active">
    <div class="card">
      <span class="phase">Prática</span>
      <h2>Identificação por imagem</h2>
      <div id="pratica-imgs"></div>
    </div>
  </section>

  <div class="footer-actions">
    <button onclick="finishGame()">Finalizar jogo</button>
    <button onclick="resetGame()">Recomeçar</button>
  </div>
  <div class="result" id="result"></div>
</div>

<script>
let score = 0, answered = 0, total = 0;
const answeredIds = new Set();

function normalize(s){return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();}
function shuffleArray(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function mark(id, points){if(answeredIds.has(id))return false;answeredIds.add(id);answered++;score+=points;updateScore();return true;}
function updateScore(){document.getElementById("score").textContent=score;document.getElementById("total").textContent=total;document.getElementById("bar").style.width=total?Math.round((answered/total)*100)+"%":"0%";}
function openTab(tabId, btn){document.querySelectorAll(".tab-content").forEach(x=>x.classList.remove("active"));document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));document.getElementById(tabId).classList.add("active");btn.classList.add("active");window.scrollTo({top:0,behavior:"smooth"});}

function makeChoiceQuestion(container,id,text,options,correctIndex,explanation=""){
  total++;
  const div=document.createElement("div");div.className="question";div.innerHTML=`<div class="qtext">${text}</div>`;
  const btns=[]; const indexedOptions=shuffleArray(options.map((op,originalIndex)=>({op,originalIndex})));
  indexedOptions.forEach((item)=>{
    const b=document.createElement("button");b.className="choice";b.textContent=item.op;
    b.onclick=()=>{if(answeredIds.has(id))return;btns.forEach(x=>x.disabled=true);
      if(item.originalIndex===correctIndex){b.classList.add("correct");mark(id,1);fb.innerHTML=`<span class="ok">✅ Correto!</span> ${explanation}`;}
      else{b.classList.add("wrong");const correctShownIndex=indexedOptions.findIndex(x=>x.originalIndex===correctIndex);if(correctShownIndex>=0)btns[correctShownIndex].classList.add("correct");mark(id,0);fb.innerHTML=`<span class="bad">❌ Incorreto.</span> ${explanation}`;}
    };
    btns.push(b);div.appendChild(b);
  });
  const fb=document.createElement("div");fb.className="feedback";div.appendChild(fb);container.appendChild(div);
}
function makeVF(container,id,text,correctBool,explanation=""){makeChoiceQuestion(container,id,text,["V","F"],correctBool?0:1,explanation);}
function makeInput(container,id,label,accepted,hint=""){
  total++;
  const div=document.createElement("div");div.className="question";div.innerHTML=`<div class="qtext">${label}</div><div class="mini">${hint}</div>`;
  const input=document.createElement("input");input.type="text";input.placeholder="Digite aqui...";
  const b=document.createElement("button");b.textContent="Conferir";const fb=document.createElement("div");fb.className="feedback";
  b.onclick=()=>{if(answeredIds.has(id))return;const ans=normalize(input.value);const ok = accepted.some(a =>
  ans === normalize(a)
);input.disabled=true;b.disabled=true;if(ok){mark(id,1);fb.innerHTML=`<span class="ok">✅ Aceito!</span>`;}else{mark(id,0);fb.innerHTML=`<span class="bad">❌ Não foi aceito.</span> Resposta esperada: <span class="pill">${accepted[0]}</span>`;}};
  div.appendChild(input);div.appendChild(b);div.appendChild(fb);container.appendChild(div);
}
function makeMultiCheck(container,id,text,options,correctSet){
  total++;
  const div=document.createElement("div");div.className="question";div.innerHTML=`<div class="qtext">${text}</div>`;
  const box=document.createElement("div");box.className="checkbox-row";
  options.forEach((op,i)=>{const lab=document.createElement("label");lab.innerHTML=`<input type="checkbox" value="${i}"> ${op}`;box.appendChild(lab);});
  const b=document.createElement("button");b.textContent="Conferir";const fb=document.createElement("div");fb.className="feedback";
  b.onclick=()=>{if(answeredIds.has(id))return;const selected=[...box.querySelectorAll("input:checked")].map(x=>Number(x.value)).sort().join(",");const correct=[...correctSet].sort().join(",");box.querySelectorAll("input").forEach(x=>x.disabled=true);b.disabled=true;if(selected===correct){mark(id,1);fb.innerHTML=`<span class="ok">✅ Correto!</span>`;}else{mark(id,0);fb.innerHTML=`<span class="bad">❌ Incorreto.</span> Resposta esperada: ${[...correctSet].map(i=>options[i]).join("; ")}.`;}};
  div.appendChild(box);div.appendChild(b);div.appendChild(fb);container.appendChild(div);
}
function makeImageQuestion(container,q){
  const div=document.createElement("div");div.className="question";
  const imageHtml=q.img?`<div class="image-box"><img src="${q.img}" alt="${q.title}"></div>`:`<div class="image-box">nao sei se tem<br><span class="mini">imagem micro no lab <code>img: ""</code> em <code>const practicalQuestions</code></span></div>`;
  div.innerHTML=`<div class="qtext">${q.title}</div>${imageHtml}`;
  const nameDiv=document.createElement("div");div.appendChild(nameDiv);
  makeInput(nameDiv,q.id+"-nome","1) Identifique o parasita, forma ou vetor:",q.acceptedName,"");
  const featDiv=document.createElement("div");div.appendChild(featDiv);
  if(q.multi){makeMultiCheck(featDiv,q.id+"-carac","2) Quais características justificam essa identificação?",q.features,new Set(q.correctFeatures));}
  else{makeChoiceQuestion(featDiv,q.id+"-carac","2) Qual característica mais ajuda a identificar?",q.features,q.correctFeatures[0]);}
  container.appendChild(div);
}

function finishGame(){
  const pct=total?Math.round((score/total)*100):0;
  const res=document.getElementById("result");
  let msg="Continue revisando ciclos, formas infectantes, vetores, diagnóstico e tratamento.";
  if(pct>=85)msg="Excelente! Você está muito forte para a prova.";
  else if(pct>=65)msg="Bom desempenho! Revise principalmente o que errou.";
  else if(pct>=45)msg="Base em construção: foque em ciclo, forma infectante, diagnóstico e manifestações clínicas.";
  res.style.display="block";
  res.innerHTML=`<h2>Resultado final</h2><p class="score">${score}/${total} pontos (${pct}%)</p><p>${msg}</p>`;
  res.scrollIntoView({behavior:"smooth"});
}
